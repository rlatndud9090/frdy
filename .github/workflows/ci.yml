name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-required:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tests changed with code
        run: ./scripts/check_test_required.sh "origin/${{ github.base_ref }}"

  lua-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4

      - name: Run unit/integration tests
        run: ./scripts/run_tests.sh
