name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  artifact-required:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate artifact completeness for branch work
        run: ./scripts/check_artifact_guard.sh "origin/${{ github.base_ref }}"

  test-required:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tests changed with code
        run: ./scripts/check_test_required.sh "origin/${{ github.base_ref }}"

  lua-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4

      - name: Run unit/integration tests
        run: ./scripts/run_tests.sh

  main-artifact-audit:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Audit merged changes include complete artifacts
        run: ./scripts/check_main_artifact_audit.sh "${{ github.event.before }}" "${{ github.sha }}"
